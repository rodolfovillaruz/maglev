digitalocean:
  provisioner:
    type: public
    node: maglev-cp-alpha
  group:
  - name: primary
    type: control-plane
    node:
    - maglev-cp-alpha
    - maglev-cp-beta
    - maglev-cp-gamma
  - name: secondary
    type: worker
    node:
    - maglev-worker-alpha
    - maglev-worker-beta
    - maglev-worker-gamma
    - maglev-worker-delta
    - maglev-worker-epsilon
  generics:
  - name: cisak
    config:
    - script: |-
        #!/bin/bash
        set -e

        apt-get update
        curl -fsSL https://github.com/rodolfovillaruz/cisak/releases/download/v0.1.12/cisak-v0.1.12-linux-amd64.tar.gz | tar -xz
        install -m 755 -o root -g root cisak /usr/local/bin/cisak
        cisak generate
        cisak install -y
      ssh-public-key: ~/.ssh/id_ed25519.pub
      user: root
      machine-type: s-2vcpu-4gb
      boot-disk-image: ubuntu-24-04-x64
      control-plane-endpoint: k8s-api.example.com
      apiServer:
        certSANs:
        - 192.168.1.100
        - api.example.com
        - k8s-master.local
  - name: primary
    config:
    - boot-disk-size: 20
  - name: secondary
    config:
    - boot-disk-size: 50
  rules:
  - group:
    - primary
    specs:
    - cisak
    - primary
  - group:
    - secondary
    specs:
    - cisak
    - secondary
  credentials:
    token: "your-digitalocean-api-token"
    region: nyc1