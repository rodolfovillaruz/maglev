digitalocean:
  group:
  - name: primary
    type: control-plane
    node:
    - maglev-cp-alpha
    - maglev-cp-beta
    - maglev-cp-gamma
  - name: secondary
    type: worker
    node:
    - maglev-worker-alpha
    - maglev-worker-beta
    - maglev-worker-gamma
    - maglev-worker-delta
    - maglev-worker-epsilon

  # The provisioner is the entry-point node used as a ProxyJump bastion for
  # any node whose ip-address resolves to a private address.
  #
  #   type  — which IP type to dial when connecting TO the provisioner itself
  #   node  — VM name of the bastion (must exist in one of the groups above)
  #
  # DigitalOcean Droplets always receive a public IP, so "type: public" is
  # the correct choice here.  The provisioner node (maglev-cp-alpha) is
  # reached directly; all other private-IP nodes tunnel through it.
  provisioner:
    type: public
    node: maglev-cp-alpha

  specs:
  - name: cisak
    config:
    - script: |-
        #!/bin/bash
        set -e

        apt-get update
        curl -fsSL https://github.com/rodolfovillaruz/cisak/releases/download/v0.1.12/cisak-v0.1.12-linux-amd64.tar.gz | tar -xz
        install -m 755 -o root -g root cisak /usr/local/bin/cisak
        cisak generate
        cisak install -y
      ssh-public-key: ~/.ssh/id_ed25519.pub
      user: root
      machine-type: s-2vcpu-4gb
      boot-disk-image: ubuntu-24-04-x64
      control-plane-endpoint: k8s-api.example.com
  - name: primary
    config:
    - boot-disk-size: 20
  - name: secondary
    config:
    - boot-disk-size: 50

  rules:
  - group:
    - primary
    specs:
    - cisak
    - primary
  - group:
    - secondary
    specs:
    - cisak
    - secondary

  credentials:
    token: "your-digitalocean-api-token"
    region: nyc1